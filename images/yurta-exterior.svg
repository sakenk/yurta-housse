<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Юрта на фоне гор">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6BA3C8"/>
      <stop offset="60%" stop-color="#A8C8E0"/>
      <stop offset="100%" stop-color="#D6E9F5"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B6940"/>
      <stop offset="100%" stop-color="#6B4F2A"/>
    </linearGradient>
    <linearGradient id="mtn-far" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="20%" stop-color="#C8D8E8"/>
      <stop offset="100%" stop-color="#6B8E6B"/>
    </linearGradient>
    <linearGradient id="mtn-mid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A8C62"/>
      <stop offset="100%" stop-color="#3A6347"/>
    </linearGradient>
    <radialGradient id="sun" cx="75%" cy="20%" r="15%">
      <stop offset="0%" stop-color="#FFE066" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFE066" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="yurta-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5EDDA"/>
      <stop offset="100%" stop-color="#DDD0B8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#2C1E0F" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="800" height="500" fill="url(#sky)"/>

  <!-- Sun glow -->
  <ellipse cx="600" cy="100" rx="120" ry="80" fill="url(#sun)"/>

  <!-- Far mountains (snow-capped) -->
  <polygon points="0,320 120,120 200,200 320,80 420,180 520,60 620,160 720,90 800,180 800,320" fill="url(#mtn-far)"/>
  <!-- Snow caps -->
  <polygon points="120,120 150,155 95,155" fill="#FFFFFF" opacity="0.9"/>
  <polygon points="320,80 355,125 290,125" fill="#FFFFFF" opacity="0.9"/>
  <polygon points="520,60 558,108 485,108" fill="#FFFFFF" opacity="0.9"/>
  <polygon points="720,90 752,130 690,130" fill="#FFFFFF" opacity="0.9"/>

  <!-- Mid mountains -->
  <polygon points="-10,400 80,260 180,320 280,220 380,300 480,210 580,280 680,230 800,300 800,400" fill="url(#mtn-mid)"/>

  <!-- Near hills -->
  <ellipse cx="0" cy="430" rx="200" ry="80" fill="#3A6347"/>
  <ellipse cx="800" cy="440" rx="220" ry="80" fill="#3A6347"/>

  <!-- Ground -->
  <rect y="400" width="800" height="100" fill="url(#ground)"/>
  <!-- Grass strip -->
  <ellipse cx="400" cy="400" rx="450" ry="20" fill="#5C8A4A"/>

  <!-- Trees (left) -->
  <rect x="80" y="320" width="12" height="80" fill="#5C3D1E" rx="3"/>
  <ellipse cx="86" cy="310" rx="30" ry="40" fill="#2D6B38"/>
  <rect x="110" y="340" width="10" height="60" fill="#5C3D1E" rx="3"/>
  <ellipse cx="115" cy="330" rx="24" ry="32" fill="#3A7A44"/>

  <!-- Trees (right) -->
  <rect x="680" y="330" width="12" height="70" fill="#5C3D1E" rx="3"/>
  <ellipse cx="686" cy="320" rx="28" ry="36" fill="#2D6B38"/>
  <rect x="706" y="345" width="10" height="55" fill="#5C3D1E" rx="3"/>
  <ellipse cx="711" cy="336" rx="22" ry="30" fill="#3A7A44"/>

  <!-- YURT (киіз үй) -->
  <!-- Base/cylinder -->
  <rect x="260" y="340" width="280" height="65" rx="4" fill="url(#yurta-body)" filter="url(#shadow)"/>
  <!-- Decorative band on cylinder -->
  <rect x="260" y="340" width="280" height="18" rx="0" fill="#C4623A" opacity="0.85"/>
  <!-- Kazakh ornament pattern on band -->
  <g fill="#F9F3E8" opacity="0.7" font-size="12">
    <rect x="275" y="344" width="8" height="8" rx="2"/>
    <rect x="295" y="344" width="8" height="8" rx="2"/>
    <rect x="315" y="344" width="8" height="8" rx="2"/>
    <rect x="335" y="344" width="8" height="8" rx="2"/>
    <rect x="355" y="344" width="8" height="8" rx="2"/>
    <rect x="375" y="344" width="8" height="8" rx="2"/>
    <rect x="395" y="344" width="8" height="8" rx="2"/>
    <rect x="415" y="344" width="8" height="8" rx="2"/>
    <rect x="435" y="344" width="8" height="8" rx="2"/>
    <rect x="455" y="344" width="8" height="8" rx="2"/>
    <rect x="475" y="344" width="8" height="8" rx="2"/>
    <rect x="495" y="344" width="8" height="8" rx="2"/>
    <rect x="515" y="344" width="8" height="8" rx="2"/>
  </g>

  <!-- Dome -->
  <path d="M255,345 Q260,240 400,210 Q540,240 545,345 Z" fill="url(#yurta-body)" filter="url(#shadow)"/>
  <!-- Dome top pole -->
  <line x1="400" y1="210" x2="400" y2="190" stroke="#8B5E3C" stroke-width="8" stroke-linecap="round"/>
  <circle cx="400" cy="185" r="10" fill="#C4623A"/>

  <!-- Dome ribs -->
  <line x1="400" y1="215" x2="265" y2="342" stroke="#C4A87A" stroke-width="2" opacity="0.5"/>
  <line x1="400" y1="215" x2="310" y2="298" stroke="#C4A87A" stroke-width="2" opacity="0.5"/>
  <line x1="400" y1="215" x2="355" y2="250" stroke="#C4A87A" stroke-width="2" opacity="0.4"/>
  <line x1="400" y1="215" x2="445" y2="250" stroke="#C4A87A" stroke-width="2" opacity="0.4"/>
  <line x1="400" y1="215" x2="490" y2="298" stroke="#C4A87A" stroke-width="2" opacity="0.5"/>
  <line x1="400" y1="215" x2="535" y2="342" stroke="#C4A87A" stroke-width="2" opacity="0.5"/>

  <!-- Dome decorative top ring -->
  <ellipse cx="400" cy="215" rx="30" ry="12" fill="none" stroke="#C4623A" stroke-width="3"/>

  <!-- Door -->
  <rect x="362" y="360" width="76" height="45" rx="4" fill="#8B5E3C"/>
  <rect x="366" y="364" width="68" height="38" rx="3" fill="#6B4020"/>
  <!-- Door arch -->
  <path d="M362,372 Q400,350 438,372" fill="#8B5E3C"/>
  <!-- Door frame -->
  <rect x="358" y="358" width="84" height="48" rx="4" fill="none" stroke="#C4623A" stroke-width="3"/>

  <!-- Smoke/clouds -->
  <ellipse cx="120" cy="80" rx="60" ry="20" fill="white" opacity="0.6"/>
  <ellipse cx="90" cy="75" rx="35" ry="16" fill="white" opacity="0.5"/>
  <ellipse cx="155" cy="80" rx="35" ry="14" fill="white" opacity="0.5"/>

  <ellipse cx="650" cy="55" rx="70" ry="22" fill="white" opacity="0.55"/>
  <ellipse cx="620" cy="50" rx="40" ry="18" fill="white" opacity="0.5"/>
  <ellipse cx="695" cy="58" rx="40" ry="16" fill="white" opacity="0.45"/>
</svg>
